name: Feature request
description: Propose a new capability or enhancement for guild.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests that align with guild's "agent-agnostic, local-first,
        one disciplined contract" ethos are most likely to land. For big
        ideas, start a Discussion first — it avoids duplicate issues.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-visible pain. Avoid jumping to a solution yet.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Your preferred shape of the feature. CLI sketch, tool name, flags, etc. welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, workarounds, or why the current behavior is insufficient.
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This keeps guild local-first (no new network calls).
        - label: This keeps guild agent-agnostic (works across MCP clients).
        - label: I'd be willing to send a PR for this.
