name: Bug report
description: Something in guild isn't working as documented.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much as you can — the more
        detail, the faster we can reproduce it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior.
      placeholder: "`guild quest accept` returned ... but I expected ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands or actions that trigger the bug.
      render: shell
      placeholder: |
        guild init
        guild quest post "..." --priority P1
        guild quest accept QUEST-1
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: guild version
      description: Output of `guild --version`.
      placeholder: "guild v0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.2 (arm64) / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP client (if relevant)
      description: Which agent Gate were you using when the bug appeared?
      options:
        - "N/A (CLI only)"
        - Claude Code
        - Codex (OpenAI)
        - Cursor
        - Windsurf
        - Zed
        - VS Code extension
        - Other (describe in What happened)
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste output, stack traces, or `~/.guild/usage.log` snippets if useful.
      render: shell
    validations:
      required: false
